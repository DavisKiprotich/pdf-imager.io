<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Center - PDF Imager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --primary-light: #EEF2FF; --text: #1E293B; --subtext: #64748B; --bg: #F8FAFC; }
        body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg); margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; padding: 40px 24px; text-align: center; }
        .logo { width: 80px; height: 80px; background: var(--primary-light); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; color: var(--primary); font-size: 32px; font-weight: 800; }
        h1 { font-size: 32px; font-weight: 800; color: #0F172A; margin-bottom: 12px; letter-spacing: -1px; }
        p.subtitle { font-size: 16px; color: var(--subtext); margin-bottom: 48px; line-height: 1.5; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px; }
        .lang-picker { margin-top: 24px; margin-bottom: 32px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .lang-btn { background: #fff; border: 1px solid #E2E8F0; padding: 6px 12px; border-radius: 100px; font-size: 13px; cursor: pointer; color: var(--subtext); transition: 0.2s; }
        .lang-btn:hover, .lang-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
        .card { 
            background: #fff; border: 2px solid #F1F5F9; border-radius: 20px; padding: 32px 24px; text-decoration: none; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: block;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.1); }
        .card h3 { font-size: 18px; font-weight: 800; color: #1E293B; margin: 0 0 8px; }
        .card p { font-size: 14px; color: var(--subtext); margin: 0; }
        
        .footer { margin-top: 64px; font-size: 13px; color: #CBD5E1; }
        
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">P</div>
    <h1 id="title">PDF Imager Legal Center</h1>
    <p class="subtitle" id="subtitle">Official legal documentation and privacy guidelines for the PDF Imager application.</p>

    <div class="lang-picker" id="lang-picker">
        <button class="lang-btn active" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('fr')">Français</button>
        <button class="lang-btn" onclick="setLang('pt')">Português</button>
        <button class="lang-btn" onclick="setLang('es')">Español</button>
        <button class="lang-btn" onclick="setLang('de')">Deutsch</button>
        <button class="lang-btn" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" onclick="setLang('ru')">Русский</button>
        <button class="lang-btn" onclick="setLang('ja')">日本語</button>
        <button class="lang-btn" onclick="setLang('ar')">العربية</button>
    </div>

    <div class="grid">
        <a href="./Privacy/" class="card">
            <h3 id="card-privacy">Privacy Policy</h3>
            <p id="sub-privacy">How we protect your data</p>
        </a>
        <a href="./Terms/" class="card">
            <h3 id="card-terms">Terms of Service</h3>
            <p id="sub-terms">Usage rules & conditions</p>
        </a>
    </div>

    <div class="footer">
        &copy; 2026 PDF Imager. <span id="footer-text">All rights reserved.</span>
    </div>
</div>

<script>
    const ui = {
        en: { title: "Legal Center", subtitle: "Official legal documentation and privacy guidelines for the PDF Imager application.", privacy: "Privacy Policy", privSub: "How we protect your data", terms: "Terms of Service", termSub: "Usage rules & conditions", footer: "All rights reserved." },
        fr: { title: "Centre juridique", subtitle: "Documentation juridique officielle et directives de confidentialité pour l'application PDF Imager.", privacy: "Politique de confidentialité", privSub: "Comment nous protégeons vos données", terms: "Conditions d'utilisation", termSub: "Règles et conditions d'utilisation", footer: "Tous droits réservés." },
        pt: { title: "Centro Jurídico", subtitle: "Documentação jurídica oficial e diretrizes de privacidade para o aplicativo PDF Imager.", privacy: "Política de Privacidade", privSub: "Como protegemos seus dados", terms: "Termos de Serviço", termSub: "Regras e condições de uso", footer: "Todos os direitos reservados." },
        es: { title: "Centro Legal", subtitle: "Documentación legal oficial y pautas de privacidad para la aplicación PDF Imager.", privacy: "Política de Privacidad", privSub: "Cómo protegemos tus datos", terms: "Términos de Servicio", termSub: "Reglas y condiciones de uso", footer: "Todos los derechos reservados." },
        de: { title: "Rechtscenter", subtitle: "Offizielle rechtliche Dokumentation und Datenschutzrichtlinien für die PDF Imager-Anwendung.", privacy: "Datenschutzerklärung", privSub: "Wie wir Ihre Daten schützen", terms: "Nutzungsbedingungen", termSub: "Nutzungsregeln & Bedingungen", footer: "Alle Rechte vorbehalten." },
        zh: { title: "法律中心", subtitle: "PDF Imager 应用程序的官方法律文档和隐私指南。", privacy: "隐私政策", privSub: "我们如何保护您的数据", terms: "服务条款", termSub: "使用规则和条件", footer: "版权所有。" },
        ru: { title: "Юридический центр", subtitle: "Официальная юридическая документация и рекомендации по конфиденциальности для приложения PDF Imager.", privacy: "Политика конфиденциальности", privSub: "Как мы защищаем ваши данные", terms: "Условия использования", termSub: "Правила и условия использования", footer: "Все права защищены." },
        ja: { title: "リーガルセンター", subtitle: "PDF Imagerアプリケーションの公式法的文書およびプライバシーガイドライン。", privacy: "プライバシーポリシー", privSub: "データ保護の方法", terms: "利用規約", termSub: "利用規則と条件", footer: "無断転載を禁じます。" },
        ar: { title: "المركز القانوني", subtitle: "الوثائق القانونية الرسمية وإرشادات الخصوصية لتطبيق PDF Imager.", privacy: "سياسة الخصوصية", privSub: "كيف نحمي بياناتك", terms: "شروط الخدمة", termSub: "قواعد وشروط الاستخدام", footer: "جميع الحقوق محفوظة." }
    };

    function setLang(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.lang-btn')).find(b => b.innerText.toLowerCase().includes(lang === 'ja' ? '日本' : lang === 'zh' ? '中文' : lang === 'ar' ? 'العربية' : ''));
        // Find by lang code instead
        const buttons = document.querySelectorAll('.lang-btn');
        const indexMap = { en:0, fr:1, pt:2, es:3, de:4, zh:5, ru:6, ja:7, ar:8 };
        buttons[indexMap[lang]].classList.add('active');

        document.getElementById('title').innerText = ui[lang].title + " - PDF Imager";
        document.getElementById('subtitle').innerText = ui[lang].subtitle;
        document.getElementById('card-privacy').innerText = ui[lang].privacy;
        document.getElementById('sub-privacy').innerText = ui[lang].privSub;
        document.getElementById('card-terms').innerText = ui[lang].terms;
        document.getElementById('sub-terms').innerText = ui[lang].termSub;
        document.getElementById('footer-text').innerText = ui[lang].footer;
        
        // RTL check
        document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
    }
</script>

</body>
</html>
